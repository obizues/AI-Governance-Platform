restricted_topics:
  - name: salary
    pattern: "salary|salaries|compensation|pay"
    allowed_roles: ["HR", "CTO", "Engineer"]
    risk_level: high
  - name: credentials
    pattern: "password|credential|secret|token"
    allowed_roles: []
    risk_level: medium
  - name: production_deploy
    pattern: "deploy|production|release"
    allowed_roles: ["Developer", "Engineering"]
    risk_level: high
  - name: marketing
    pattern: "campaign|promotion|advertising"
    allowed_roles: ["Marketing", "Admin"]
    risk_level: low
  - name: feedback
    pattern: "feedback|review|comment"
    allowed_roles: ["User", "Admin"]
    risk_level: low
  - name: evaluation
    pattern: "evaluation|score|assessment"
    allowed_roles: ["Evaluator", "Admin"]
    risk_level: low
  - name: onboarding
    pattern: "onboarding|new hire|orientation"
    allowed_roles: ["HR", "Admin"]
    risk_level: low
  - name: training
    pattern: "training|course|learning"
    allowed_roles: ["Employee", "HR", "Admin"]
    risk_level: low
  - name: system_health
    pattern: "health|status|uptime"
    allowed_roles: ["Engineer", "Admin"]
    risk_level: low
  - name: customer_support
    pattern: "support|ticket|customer"
    allowed_roles: ["Support", "Admin"]
    risk_level: low
role_permissions:
  HR:
    deny_patterns: ["deploy", "production"]
  CTO:
    deny_patterns: ["HR data"]
  Engineer:
    deny_patterns: ["all salaries", "employee salaries", "salary data except own"]
    allow_patterns: ["my salary", "own salary"]
minimum_confidence: 0.7
controls:
  require_citations: true
  refuse_low_confidence: true
  escalate_high_risk: true
